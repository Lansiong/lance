<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moto Rent - Log In</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body {
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }
    .login-container {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    .login-container h5 {
      color: #333;
      margin-bottom: 20px;
    }
    .form-control:focus {
      box-shadow: 0 0 5px rgba(33, 147, 176, 0.5);
      border-color: #2193b0;
    }
    .btn-primary {
      background-color: #2193b0;
      border-color: #2193b0;
    }
    .btn-primary:hover {
      background-color: #6dd5ed;
      border-color: #6dd5ed;
    }
  </style>
</head>
<body>
  <div class="container login-container">
    <h5 class="text-center">Log In to Moto Rent</h5>
    <form id="loginForm">
      <div class="mb-3">
        <label for="text" class="form-label text-dark">Email address</label>
        <input type="text" class="form-control" id="email" placeholder="Enter your email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label text-dark">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Log In</button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = "username";
      const password = "password";

      const enteredEmail = document.getElementById('email').value;
      const enteredPassword = document.getElementById('password').value;

      if (enteredEmail === username && enteredPassword === password) {
        alert('Login successful!');
        window.location.href = "index.html";
      } else {
        alert('Invalid credentials. Please try again.');
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
